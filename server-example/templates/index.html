<html>

<head>
    <title>badgepy demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: sans-serif;
            padding: 2em;
        }

        .badge-row {
            display: flex;
            align-items: flex-start;
            gap: 2em;
            margin-bottom: 2.5em;
            border-bottom: 1px solid #eee;
            padding-bottom: 2em;
        }

        .badge-preview {
            flex-shrink: 0;
            padding-top: 0.4em;
        }

        .badge-snippets {
            font-family: 'Roboto Mono', monospace;
            font-size: 0.85em;
        }

        .snippet-label {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 0.2em;
            margin-top: 0.8em;
        }

        pre {
            background: #f5f5f5;
            padding: 0.8em 1em;
            border-radius: 4px;
            margin: 0;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h2>badgepy demo</h2>
    {% for badge in badges %}
    <div class="badge-row">
        <div class="badge-snippets">
            <div class="snippet-label">Python API</div>
            <pre>{{ badge.python_snippet }}</pre>
            <div class="snippet-label">CLI</div>
            <pre>{{ badge.cli_cmd }}</pre>
        </div>
        <div class="badge-preview">
            <img src="{{ badge.url }}">
        </div>
    </div>
    {% endfor %}
</body>

</html>
